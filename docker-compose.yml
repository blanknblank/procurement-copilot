version: "3.9"

services:

  api:

    build: .

    container_name: procurement-api

    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

    ports:
      - "8000:8000"

    volumes:
      - .:/app

  dashboard:

    build: .

    container_name: procurement-dashboard

    command: streamlit run app/dashboard.py --server.address=0.0.0.0

    ports:
      - "8501:8501"

    depends_on:
      - api

    volumes:
      - .:/app